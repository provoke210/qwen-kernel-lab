name: reference-tests

on:
  push:
  pull_request:

jobs:
  cpu-reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - run: python -m unittest discover -s tests -v

